name: Daily Crypto Report

on:
  schedule:
    # 한국 시간(KST) 아침 8시 30분 자동 발송
    - cron: '30 23 * * *'
  workflow_dispatch: # 직접 버튼 눌러 실행 옵션

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        env:
          # 바로 이 아래 줄이 뉴스 요약을 가능하게 하는 핵심 연결 고리입니다!
          OPENAI_API_KEY: ${{ secrets.my_coin_report_bot }}
        run: python bot.py
