name: Daily Crypto Report

on:
  schedule:
    - cron: '30 23 * * *' # 한국 시간 아침 8시 30분
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        env:
          # 금고 이름과 배달 상자 이름을 모두 'OPENAI_API_KEY'로 통일!
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python bot.py
