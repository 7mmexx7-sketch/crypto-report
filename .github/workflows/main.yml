name: Daily Crypto Report Automation

on:
  schedule:
    # 1. 한국 시간 오전 9:00 (UTC 00:00)
    # 2. 한국 시간 오후 7:00 (UTC 10:00)
    - cron: '0 0,10 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python bot.py
